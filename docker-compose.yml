services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: signalplane
      POSTGRES_USER: signalplane
      POSTGRES_PASSWORD: signalplane
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signalplane -d signalplane"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/postgres/init:/docker-entrypoint-initdb.d:ro

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    environment:
      CLICKHOUSE_DB: signalplane
      CLICKHOUSE_USER: signalplane
      CLICKHOUSE_PASSWORD: signalplane
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./deploy/clickhouse/init:/docker-entrypoint-initdb.d:ro

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    environment:
      SIGNALPLANE_INGEST_TOKEN: "${SIGNALPLANE_INGEST_TOKEN:-dev-token}"
    ports:
      - "4317:4317"
      - "4319:4318"
      - "8888:8888"
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - ./deploy/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro

  signalplane-log-agent:
    image: otel/opentelemetry-collector-contrib:0.111.0
    command: ["--config=/etc/otelcol-contrib/agent-config.yaml"]
    depends_on:
      otel-collector:
        condition: service_started
    volumes:
      - ./deploy/otel-collector/agent-config.yaml:/etc/otelcol-contrib/agent-config.yaml:ro
      - app-logs:/var/log/signalplane-apps:ro
      - otel-agent-storage:/var/lib/otelcol/storage

  demo-log-writer:
    image: signalplane:dev
    entrypoint: ["/bin/sh"]
    command: ["/opt/signalplane/write-logs.sh"]
    depends_on:
      signalplane:
        condition: service_started
      signalplane-log-agent:
        condition: service_started
    environment:
      SIGNALPLANE_SERVICE_NAME: agent-checkout-api
      SIGNALPLANE_HOST_NAME: demo-node-1
      SIGNALPLANE_ENVIRONMENT: production
      SIGNALPLANE_REGION: local
      SIGNALPLANE_SERVICE_VERSION: agent-demo-0.1.0
      SIGNALPLANE_LOG_INTERVAL_SECONDS: "2"
      SIGNALPLANE_LOG_FAIL_EVERY: "5"
    volumes:
      - ./examples/log-writer/write-logs.sh:/opt/signalplane/write-logs.sh:ro
      - app-logs:/var/log/signalplane-apps

  mailpit:
    image: axllent/mailpit:v1.21
    ports:
      - "1025:1025"
      - "8025:8025"

  signalplane:
    build:
      context: .
      dockerfile: Containerfile
    image: signalplane:dev
    ports:
      - "4318:4318"
    environment:
      SIGNALPLANE_ADDR: "0.0.0.0:4318"
      SIGNALPLANE_INGEST_TOKEN: "${SIGNALPLANE_INGEST_TOKEN:-dev-token}"
      SIGNALPLANE_BOOTSTRAP_ADMIN_TOKEN: "${SIGNALPLANE_BOOTSTRAP_ADMIN_TOKEN:-dev-admin-token}"
      SIGNALPLANE_BOOTSTRAP_USER_EMAIL: "${SIGNALPLANE_BOOTSTRAP_USER_EMAIL:-admin@signalplane.local}"
      SIGNALPLANE_BOOTSTRAP_USER_PASSWORD: "${SIGNALPLANE_BOOTSTRAP_USER_PASSWORD:-admin-password}"
      SIGNALPLANE_REQUIRE_READ_AUTH: "true"
      SIGNALPLANE_DATA_PATH: "/data/signalplane.json"
      SIGNALPLANE_SEED_DEMO_DATA: "true"
      SIGNALPLANE_STORE_BACKEND: "postgres"
      SIGNALPLANE_TELEMETRY_BACKEND: "clickhouse"
      SIGNALPLANE_TELEMETRY_REPLAY_PATH: "/data/telemetry-replay.jsonl"
      SIGNALPLANE_POSTGRES_ADDR: "postgres:5432"
      SIGNALPLANE_POSTGRES_URL: "postgres://signalplane:signalplane@postgres:5432/signalplane?sslmode=disable"
      SIGNALPLANE_POSTGRES_USER: "signalplane"
      SIGNALPLANE_POSTGRES_PASSWORD: "signalplane"
      SIGNALPLANE_POSTGRES_DATABASE: "signalplane"
      SIGNALPLANE_CLICKHOUSE_URL: "http://clickhouse:8123"
      SIGNALPLANE_CLICKHOUSE_DATABASE: "signalplane"
      SIGNALPLANE_CLICKHOUSE_USER: "signalplane"
      SIGNALPLANE_CLICKHOUSE_PASSWORD: "signalplane"
      SIGNALPLANE_CLICKHOUSE_HTTP_URL: "http://clickhouse:8123/ping"
      SIGNALPLANE_OTEL_GRPC_ADDR: "otel-collector:4317"
      SIGNALPLANE_OTEL_HTTP_ADDR: "otel-collector:4318"
      SIGNALPLANE_SMTP_ADDR: "mailpit:1025"
      SIGNALPLANE_NOTIFICATION_FROM: "signalplane@local.test"
      SIGNALPLANE_MAILPIT_URL: "http://mailpit:8025"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      otel-collector:
        condition: service_started
      mailpit:
        condition: service_started
    volumes:
      - signalplane-data:/data

volumes:
  postgres-data:
  clickhouse-data:
  signalplane-data:
  app-logs:
  otel-agent-storage:
