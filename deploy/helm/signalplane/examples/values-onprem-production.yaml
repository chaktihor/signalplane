replicaCount: 3

image:
  repository: registry.customer.local/observability/signalplane
  tag: 0.1.0
  pullPolicy: IfNotPresent
  pullSecrets:
    - name: customer-registry-pull

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: signalplane.observability.customer.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: signalplane-tls
      hosts:
        - signalplane.observability.customer.local

resources:
  requests:
    cpu: "2"
    memory: 2Gi
  limits:
    cpu: "4"
    memory: 4Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 2

persistence:
  enabled: true
  storageClassName: fast-rwo
  size: 20Gi

config:
  seedDemoData: "false"
  storeBackend: postgres
  telemetryBackend: clickhouse
  postgresSSLMode: require
  clickhouseURL: http://clickhouse.observability.svc.cluster.local:8123
  clickhouseDatabase: signalplane
  clickhouseUser: signalplane
  clickhouseHTTPURL: http://clickhouse.observability.svc.cluster.local:8123/ping
  smtpAddr: smtp.customer.local:587
  notificationFrom: signalplane@customer.local
  secureCookies: "true"
  cookieDomain: signalplane.observability.customer.local

secret:
  create: false
  existingSecret: signalplane-runtime

networkPolicy:
  enabled: true
  ingressNamespaceSelector:
    kubernetes.io/metadata.name: ingress-nginx
