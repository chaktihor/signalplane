apiVersion: v1
kind: Service
metadata:
  name: {{ include "signalplane.fullname" . }}-headless
  labels:
    {{- include "signalplane.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "signalplane.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
