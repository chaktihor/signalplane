apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "signalplane.fullname" . }}
  labels:
    {{- include "signalplane.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "signalplane.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "signalplane.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "signalplane.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "signalplane.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: signalplane
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "signalplane.fullname" . }}-config
          env:
            - name: SIGNALPLANE_INGEST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "signalplane.secretName" . }}
                  key: {{ .Values.secret.keys.ingestToken }}
            - name: SIGNALPLANE_BOOTSTRAP_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "signalplane.secretName" . }}
                  key: {{ .Values.secret.keys.bootstrapAdminToken }}
            - name: SIGNALPLANE_BOOTSTRAP_USER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ include "signalplane.secretName" . }}
                  key: {{ .Values.secret.keys.bootstrapUserEmail }}
            - name: SIGNALPLANE_BOOTSTRAP_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "signalplane.secretName" . }}
                  key: {{ .Values.secret.keys.bootstrapUserPassword }}
            - name: SIGNALPLANE_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "signalplane.secretName" . }}
                  key: {{ .Values.secret.keys.postgresURL }}
            - name: SIGNALPLANE_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "signalplane.secretName" . }}
                  key: {{ .Values.secret.keys.postgresPassword }}
            - name: SIGNALPLANE_CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "signalplane.secretName" . }}
                  key: {{ .Values.secret.keys.clickhousePassword }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if not .Values.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- else }}
      {{- with .Values.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClassName }}
        storageClassName: {{ .Values.persistence.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
