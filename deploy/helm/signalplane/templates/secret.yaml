{{- if .Values.secret.create -}}
{{- if empty .Values.secret.values.ingestToken -}}
{{- fail "secret.values.ingestToken is required when secret.create=true" -}}
{{- end -}}
{{- if empty .Values.secret.values.postgresURL -}}
{{- fail "secret.values.postgresURL is required when secret.create=true" -}}
{{- end -}}
{{- if empty .Values.secret.values.postgresPassword -}}
{{- fail "secret.values.postgresPassword is required when secret.create=true" -}}
{{- end -}}
{{- if empty .Values.secret.values.clickhousePassword -}}
{{- fail "secret.values.clickhousePassword is required when secret.create=true" -}}
{{- end -}}
{{- if and (eq (toString .Values.config.requireReadAuth) "true") (empty .Values.secret.values.bootstrapAdminToken) (or (empty .Values.secret.values.bootstrapUserEmail) (empty .Values.secret.values.bootstrapUserPassword)) -}}
{{- fail "read auth is enabled; set secret.values.bootstrapAdminToken or both secret.values.bootstrapUserEmail and secret.values.bootstrapUserPassword" -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "signalplane.secretName" . }}
  labels:
    {{- include "signalplane.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secret.keys.ingestToken }}: {{ .Values.secret.values.ingestToken | quote }}
  {{ .Values.secret.keys.bootstrapAdminToken }}: {{ .Values.secret.values.bootstrapAdminToken | quote }}
  {{ .Values.secret.keys.bootstrapUserEmail }}: {{ .Values.secret.values.bootstrapUserEmail | quote }}
  {{ .Values.secret.keys.bootstrapUserPassword }}: {{ .Values.secret.values.bootstrapUserPassword | quote }}
  {{ .Values.secret.keys.postgresURL }}: {{ .Values.secret.values.postgresURL | quote }}
  {{ .Values.secret.keys.postgresPassword }}: {{ .Values.secret.values.postgresPassword | quote }}
  {{ .Values.secret.keys.clickhousePassword }}: {{ .Values.secret.values.clickhousePassword | quote }}
{{- end }}
